openapi: 3.1.0
info:
  title: Smart Campus - Integrated Core Business API
  version: 1.0.0
  description: API contract tổng hợp cho Core Business (Cặp 02, 03 và 10).
  contact:
    name: Ngô Hoàng Huy
    email: developer@smartcampus.vn
servers:
  - url: http://localhost:4010
    description: Prism Mock Server
tags:
  - name: System
    description: Các API quản lý trạng thái hệ thống
  - name: Vision
    description: Các API xử lý phân tích và nhận diện hình ảnh (Cặp 02)
  - name: Access Control
    description: Các API quản lý kiểm soát ra vào và thẻ (Cặp 03)
  - name: Policy
    description: Các API kiểm tra chính sách an ninh (Cặp 10)
paths:
  # --- CHUNG ---
  /health:
    get:
      tags: [System]
      summary: Health check trạng thái dịch vụ
      description: Kiểm tra trạng thái hoạt động của hệ thống (Dùng chung cho cả AI Vision và Access Gate).
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: UP }

  # --- CẶP 02: AI VISION ---
  /vision/face-match:
    post:
      tags: [Vision]
      summary: Gửi yêu cầu nhận diện khuôn mặt
      description: Gửi link ảnh để AI Vision phân tích định danh nhân sự.
      operationId: postFaceMatch
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaceMatchRequest' }
      responses:
        '200':
          description: Kết quả nhận diện
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaceMatchResponse' }
        '422':
          description: Không thể xử lý ảnh (Lỗi nghiệp vụ AI)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /vision/detections/{detectionId}:
    get:
      tags: [Vision]
      summary: Tra cứu chi tiết một kết quả nhận diện
      description: Truy xuất thông tin chi tiết của một kết quả nhận diện dựa trên ID.
      operationId: getDetectionById
      parameters:
        - name: detectionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Chi tiết kết quả
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DetectionResult' }

  /vision/results/recent:
    get:
      tags: [Vision]
      summary: Danh sách kết quả nhận diện gần đây
      description: Trả về một mảng chứa các kết quả nhận diện gần nhất.
      operationId: getRecentDetections
      responses:
        '200':
          description: Mảng kết quả
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DetectionResult' }

  # --- CẶP 03: ACCESS GATE (Consumer) ---
  /access/logs/recent:
    get:
      tags: [Access Control]
      summary: Lấy danh sách log quẹt thẻ gần đây
      description: Truy xuất các lượt ra vào mới nhất từ Access Gate để đồng bộ dữ liệu.
      operationId: getRecentAccessLogs
      responses:
        '200':
          description: Danh sách log quẹt thẻ
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AccessLog' }

  /access/logs/{logId}:
    get:
      tags: [Access Control]
      summary: Tra cứu chi tiết một lượt quẹt thẻ
      description: Lấy thông tin chi tiết của một lượt quẹt thẻ cụ thể.
      operationId: getAccessLogById
      parameters:
        - name: logId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Chi tiết log quẹt thẻ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccessLog' }

  /gates/{gateId}/status:
    get:
      tags: [Access Control]
      summary: Kiểm tra trạng thái của một cổng
      description: Truy xuất tình trạng hiện tại của một cổng Access Gate.
      operationId: getGateStatus
      parameters:
        - name: gateId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Trạng thái cổng hiện tại
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GateStatus' }

  /cards/{cardId}:
    get:
      tags: [Access Control]
      summary: Tra cứu thông tin và trạng thái thẻ
      description: Lấy thông tin chi tiết và trạng thái hoạt động của thẻ nhân sự.
      operationId: getCardInfo
      parameters:
        - name: cardId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Chi tiết thẻ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CardInfo' }

  # --- CẶP 10: ACCESS POLICY (Provider) ---
  /access/check:
    post:
      tags: [Policy]
      summary: Kiểm tra quyền ra vào Realtime
      description: Access Gate gọi để kiểm tra Policy trước khi mở cổng.
      operationId: checkAccessPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccessCheckRequest' }
      responses:
        '200':
          description: Kết quả quyết định mở cổng
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccessCheckResponse' }

  /policies/access/{policyId}:
    get:
      tags: [Policy]
      summary: Xem chi tiết cấu hình Policy
      description: Truy xuất thông tin chi tiết của một Policy ra/vào.
      operationId: getPolicyById
      parameters:
        - name: policyId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Thông tin Policy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccessPolicy' }

  /decisions/{decisionId}:
    get:
      tags: [Policy]
      summary: Tra cứu quyết định đã cấp
      description: Xem lại lịch sử hệ thống đã cấp quyết định cho một mã giao dịch.
      operationId: getDecisionById
      parameters:
        - name: decisionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Thông tin quyết định
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DecisionRecord' }

components:
  schemas:
    ProblemDetails:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }

    FaceMatchRequest:
      type: object
      required: [imageRef, traceId]
      properties:
        imageRef: { type: string, format: uri }
        traceId: { type: string }
        timestamp: { type: [string, "null"], format: date-time }

    FaceMatchResponse:
      type: object
      required: [status, confidence, modelVersion]
      properties:
        status: { type: string, enum: [success, low_confidence, failed] }
        confidence: { type: number }
        matchId: { type: [string, "null"] }
        modelVersion: { type: string }

    DetectionResult:
      type: object
      required: [detectionType, timestamp]
      discriminator: { propertyName: detectionType }
      oneOf:
        - $ref: '#/components/schemas/FaceDetection'
        - $ref: '#/components/schemas/VehicleDetection'

    FaceDetection:
      type: object
      required: [detectionType]
      properties:
        detectionType: { type: string, enum: [face] }
        matchId: { type: string }
        confidence: { type: number }
        timestamp: { type: string, format: date-time }

    VehicleDetection:
      type: object
      required: [detectionType]
      properties:
        detectionType: { type: string, enum: [vehicle] }
        licensePlate: { type: string }
        timestamp: { type: string, format: date-time }

    AccessLog:
      type: object
      required: [cardId, gateId, direction, timestamp, status]
      properties:
        logId: { type: string }
        cardId: { type: string }
        gateId: { type: string }
        direction: { type: string, enum: [IN, OUT] }
        timestamp: { type: string, format: date-time }
        status: { type: string, enum: [GRANTED, DENIED] }
        operatorNote: { type: [string, "null"] }

    GateStatus:
      type: object
      required: [gateId, status]
      properties:
        gateId: { type: string }
        status: { type: string, enum: [OPEN, CLOSED, ERROR, MAINTENANCE] }
        lastMaintenance: { type: [string, "null"], format: date-time }

    CardInfo:
      type: object
      required: [cardId, status]
      properties:
        cardId: { type: string }
        status: { type: string, enum: [ACTIVE, INACTIVE, BLOCKED] }
        ownerName: { type: [string, "null"] }

    AccessCheckRequest:
      type: object
      required: [cardId, gateId, direction]
      properties:
        cardId: { type: string }
        gateId: { type: string }
        direction: { type: string, enum: [IN, OUT] }

    AccessCheckResponse:
      type: object
      required: [decision, policyId, expiresAt]
      properties:
        decision: { type: string, enum: [allow, deny] }
        reasonCode: { type: [string, "null"] }
        policyId: { type: string }
        expiresAt: { type: string, format: date-time }

    AccessPolicy:
      type: object
      required: [policyId, name]
      properties:
        policyId: { type: string }
        name: { type: string }

    DecisionRecord:
      type: object
      required: [decisionId, decision]
      properties:
        decisionId: { type: string }
        decision: { type: string, enum: [allow, deny] }
        timestamp: { type: string, format: date-time }